name: Backend CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    name: Python backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn

      - name: Compile backend
        run: python -m compileall core tests

      - name: Initialize SQLite database
        env:
          USE_SQLITE: "1"
          DEBUG: "True"
        run: |
          rm -f taskflow.db
          python init_db.py

      - name: Start backend server
        env:
          USE_SQLITE: "1"
          DEBUG: "True"
          API_HOST: "127.0.0.1"
          API_PORT: "8000"
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          python - <<'PY'
          import time
          import requests

          for _ in range(30):
              try:
                  response = requests.get("http://127.0.0.1:8000/health", timeout=2)
                  if response.status_code == 200:
                      print("Backend is healthy")
                      break
              except requests.RequestException:
                  pass
              time.sleep(1)
          else:
              print(open("server.log", encoding="utf-8", errors="replace").read())
              raise SystemExit("Backend did not start")
          PY

      - name: Run backend tests
        env:
          USE_SQLITE: "1"
          DEBUG: "True"
        run: python -m pytest -q

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-server-log
          path: server.log
